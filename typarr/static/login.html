<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Typarr - Login</title>
  <link rel="icon" type="image/svg+xml" href="/img/icon.svg">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="/css/vendor/colours.css">
  <link rel="stylesheet" href="/api/theme.css">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--cd-cold-grey-10);
      color: var(--cd-cold-grey-90);
      font-family: "Poppins", sans-serif;
    }

    .login-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 48px 56px;
      background: var(--cd-cold-grey-20);
      border: 1px solid var(--cd-cold-grey-30);
      border-radius: 12px;
      box-shadow: 0 4px 24px rgb(0 0 0 / 30%);
      text-align: center;
      max-width: 420px;
      width: 90%;
    }

    .login-logo {
      height: 64px;
    }

    .login-heading {
      font-size: 20px;
      font-weight: 600;
      color: var(--cd-cold-grey-90);
    }

    .login-desc {
      font-size: 14px;
      color: var(--cd-cold-grey-60);
      line-height: 1.6;
    }

    .login-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 32px;
      border: none;
      border-radius: 8px;
      background: var(--accent-60);
      color: #ffffff;
      font-family: "Poppins", sans-serif;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: background 150ms ease, transform 150ms ease;
    }

    .login-btn:hover {
      background: var(--accent-70);
      transform: translateY(-1px);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .login-btn svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    .login-footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      font-size: 12px;
      color: var(--cd-cold-grey-50);
    }

    .login-footer a {
      display: inline-flex;
      align-items: center;
      color: var(--cd-cold-grey-60);
      text-decoration: none;
      transition: color 150ms ease;
    }

    .login-footer a:hover {
      color: var(--cd-cold-grey-80);
    }

    .login-footer img {
      height: 18px;
      opacity: 0.5;
      transition: opacity 150ms ease;
    }

    .login-footer a:hover img {
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <img class="login-logo" src="/img/logo.svg" alt="Typarr">
    <h1 class="login-heading">Welcome to Typarr</h1>
    <p class="login-desc">
      A collaborative Typst editor for creating
      beautiful documents, right in your browser.
    </p>
    <a class="login-btn" href="/oidc/login">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
      Login with SSO
    </a>
  </div>

  <footer class="login-footer">
    <a href="https://confirm.ch" target="_blank" rel="noopener">
      <img src="https://assets.confirm.ch/logo/mono-light.svg" alt="confirm IT">
    </a>
    <span>No trees were harmed in the making. Pages may contain traces of Typst.<br>Swiss-made 🇨🇭 by <a href="https://confirm.ch" target="_blank" rel="noopener">confirm IT</a>, powered by caffeine ☕, and beautiful typography ♥️.</span>
  </footer>
</body>
</html>
