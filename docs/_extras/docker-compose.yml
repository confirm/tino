---
services:

  typarr:

    image: ghcr.io/confirm/typarr

    environment:
      OIDC_DISCOVERY_URL: https://sso.example.com/.well-known/openid-configuration
      OIDC_CLIENT_SECRET: change-me
      TRUSTED_PROXIES: '*'

    ports:
      - '5000:5000'

    read_only: true

    tmpfs:
      - /tmp

    volumes:
      - data:/data

    restart: unless-stopped

volumes:
  data:
