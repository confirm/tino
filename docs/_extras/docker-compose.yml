---
services:

  tino:

    image: ghcr.io/confirm/tino

    environment:
      TINO_BASE_URL: https://tino.example.com
      TINO_OIDC_DISCOVERY_URL: https://sso.example.com/.well-known/openid-configuration
      TINO_OIDC_CLIENT_SECRET: change-me

    ports:
      - '5000:5000'

    read_only: true

    tmpfs:
      - /tmp

    volumes:
      - data:/data

    restart: unless-stopped

volumes:
  data:
